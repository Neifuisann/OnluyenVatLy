<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chia sẻ bài học: {{LESSON_NAME}}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        /* Use global theme variables so page matches /lessons theme */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        .share-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 980px;
            background: var(--bg-card);
            padding: 28px;
            border-radius: 12px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            border: 1px solid var(--border-primary);
        }

        .lesson-image {
            display: block;
            margin: 0 auto 16px auto;
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(2,6,23,0.6);
            border: 1px solid rgba(255,255,255,0.04);
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        }

        h1 {
            margin: 6px 0 14px 0;
            font-size: 1.9rem;
            line-height: 1.15;
            color: var(--text-primary);
        }

        .info {
            display: flex;
            gap: 18px;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }

        .info p { margin:0; display:inline-flex; align-items:center; gap:8px; font-size:0.98rem }

        .info svg path { fill: var(--text-secondary); }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2,6,23,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: var(--z-modal);
            transition: opacity 0.3s ease-out;
        }

        .loading-overlay.hidden { opacity: 0; pointer-events: none }

        .start-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-gradient);
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(16,24,40,0.4);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
            margin-top: 8px;
        }

        .start-button:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(16,24,40,0.45); }

        /* History section styles (dark) */
        .user-history-section { margin-top: 36px; width: 100%; text-align: left }

        .history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.03) }

        .history-header h2 { margin:0; font-size:1.06rem; color:var(--text-primary-dark); display:flex; align-items:center; gap:10px; font-weight:700 }

        .history-header h2 i { color: var(--accent); font-size:1.05rem }

        .collapse-btn { background: var(--bg-card); border:1px solid var(--border-primary); cursor:pointer; color:var(--text-primary); padding:8px 10px; border-radius:8px; display:inline-flex; align-items:center; gap:8px }

        .collapse-btn:hover { background: var(--bg-hover) }

        .collapse-btn .chev { transition: transform 0.25s ease; color: var(--text-secondary) }

        .collapse-btn.collapsed .chev { transform: rotate(180deg); color: var(--neon-blue) }

        .history-content { transition: max-height 0.35s ease, opacity 0.25s ease; max-height:1000px; overflow:hidden; opacity:1 }

        .history-content.collapsed { max-height:0; opacity:0 }

        .history-card { background: var(--bg-secondary); border:1px solid var(--border-primary); border-left:4px solid var(--neon-blue); border-radius:10px; padding:14px; margin-bottom:12px }

        .history-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px }

        .score-badge { padding:6px 12px; border-radius:999px; color:var(--text-primary); font-weight:800; background:var(--neon-blue) }

        .score-badge.score-good { background: var(--success-gradient); }
        .score-badge.score-medium { background: var(--warning-gradient); }
        .score-badge.score-bad { background: var(--danger-gradient); }

        .history-meta { display:flex; gap:12px; flex-wrap:wrap; color:var(--muted); font-size:0.95rem }

        .meta-item i { color: var(--accent); }

        .correct-count { color: var(--success); font-weight:700 }

        .details-link { color: var(--accent); background: rgba(58,160,255,0.06); padding:6px 10px; border-radius:6px; display:inline-flex; gap:8px; align-items:center; text-decoration:none }

        .details-link:hover { background: rgba(58,160,255,0.12) }


        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary, #666);
        }

        .meta-item i {
            color: #1877f2;
            width: 16px;
            text-align: center;
        }

        .correct-count {
            color: #22ab94;
            font-weight: 600;
        }

        .details-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 0.95em;
            color: #1877f2;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 6px 10px;
            border-radius: 5px;
        }

        .details-link:hover {
            background-color: rgba(24, 119, 242, 0.1);
            color: #0d47a1;
            transform: translateX(3px);
        }

        .details-link i {
            font-size: 0.9em;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .share-container {
                padding: 2rem;
            }
            
            .share-container h1 {
                font-size: 2rem;
            }
            
            .share-container .info {
                font-size: 1rem;
            }
            
            .share-container .start-button {
                font-size: 1.1rem;
                padding: 0.875rem 2rem;
            }

            .history-meta {
                grid-template-columns: 1fr;
            }

            .history-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .collapse-btn {
                position: absolute;
                right: 0;
                top: 0;
            }

            .history-header {
                position: relative;
            }
        }
        
        @media (max-width: 480px) {
            .share-container h1 {
                font-size: 1.75rem;
            }
            
            .share-container .info p {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .share-container .info svg {
                margin-left: 0;
            }

            .history-card {
                padding: 12px;
            }

            .score-badge {
                font-size: 0.85em;
                padding: 3px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Background Animation -->
    <canvas id="network-canvas"></canvas>

    <!-- Home Button -->
    <a href="/" class="home-button">
        <img src="https://styles.redditmedia.com/t5_851o4i/styles/profileIcon_0elfudeu2s5b1.jpg?width=256&height=256&frame=1&auto=webp&crop=256:256,smart&s=86be605407a08efe2894a6bacd089074aca51879" alt="Home">
    </a>

    <div id="content-container" class="share-container">
        <img src="{{LESSON_IMAGE_URL}}" alt="Lesson Image" class="lesson-image" onerror="this.style.display='none';">
        <h1>{{LESSON_NAME}}</h1>
        <div class="info">
            <p>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"></path>
                    <path d="M11 11h2v6h-2zm0-4h2v2h-2z"></path>
                </svg>
                <span>Số lượng câu hỏi: <strong>{{QUESTION_COUNT}}</strong></span>
            </p>
            <p>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 2a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3zm9 11v-1a7 7 0 0 0-7-7h-4a7 7 0 0 0-7 7v1h2v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1z"></path>
                </svg>
                <span>Tổng lượt đã làm: <strong>{{SUBMISSION_COUNT}}</strong></span>
            </p>
        </div>
        <a href="/lesson/{{LESSON_ID}}" class="start-button">
            <i class="fas fa-rocket"></i>
            Bắt đầu luyện tập
        </a>

        <!-- History Section with Collapse -->
        <div class="user-history-section">
            {{HISTORY_HTML_CONTENT}}
        </div>
    </div>

    <script src="/js/network-animation.js"></script>
    <script>
        // Initialize collapse functionality
        function initializeCollapseButtons() {
            const collapseBtn = document.querySelector('.collapse-btn');
            const historyContent = document.querySelector('.history-content');
            const chev = collapseBtn ? collapseBtn.querySelector('.chev') : null;

            if (collapseBtn && historyContent) {
                const setState = (collapsed) => {
                    if (collapsed) {
                        historyContent.classList.add('collapsed');
                        collapseBtn.classList.add('collapsed');
                        if (chev) chev.classList.add('rotated');
                    } else {
                        historyContent.classList.remove('collapsed');
                        collapseBtn.classList.remove('collapsed');
                        if (chev) chev.classList.remove('rotated');
                    }
                };

                collapseBtn.addEventListener('click', function() {
                    const isCollapsed = historyContent.classList.toggle('collapsed');
                    collapseBtn.classList.toggle('collapsed');
                    if (chev) chev.classList.toggle('rotated');
                    // Save state to localStorage
                    localStorage.setItem('historyCollapsed', historyContent.classList.contains('collapsed'));
                });

                // Restore collapsed state from localStorage
                const wasCollapsed = localStorage.getItem('historyCollapsed') === 'true';
                setState(wasCollapsed);
            }
        }

        // Hide loader and show content when the page is fully loaded
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-overlay');
            const content = document.getElementById('content-container');
            
            if (loader) {
                loader.classList.add('hidden');
            }
            
            if (content) {
                content.classList.add('loaded');
            }

            // Initialize collapse buttons after DOM is ready
            initializeCollapseButtons();
        });
        
        // Add animation to elements
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.share-container > *');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s ease-out';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
</body>
</html>
